<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>IPL Standings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 p-6">
    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-10">
            <div class="flex items-center gap-4"><img src="https://upload.wikimedia.org/wikipedia/en/thumb/8/84/Indian_Premier_League_Official_Logo.svg/1200px-Indian_Premier_League_Official_Logo.svg.png" class="h-12"><h1 class="text-3xl font-black italic text-[#000080]">STANDINGS</h1></div>
            <a href="index.html" class="bg-white border px-6 py-2 rounded-2xl text-xs font-black text-[#000080]">← BACK</a>
        </div>
        <div class="bg-white rounded-3xl shadow-xl overflow-hidden border">
            <table class="w-full text-left">
                <thead class="bg-slate-50 text-[10px] uppercase text-slate-400 font-bold">
                    <tr><th class="p-6">Rank</th><th class="p-6">Player</th><th class="p-6">Form (Last 5)</th><th class="p-6 text-right">Points</th></tr>
                </thead>
                <tbody id="lb-body" class="divide-y divide-slate-100"></tbody>
            </table>
        </div>
    </div>
    <script src="script.js"></script>
    <script>
        async function loadLB() {
            const res = await fetch(`${API}?action=getLeaderboard`);
            const data = await res.json();
            document.getElementById('lb-body').innerHTML = data.map((u, i) => `
                <tr><td class="p-6 font-black text-slate-300 text-xl">#${i+1}</td>
                    <td class="p-6 font-bold text-slate-800">${u.name}</td>
                    <td class="p-6"><div class="flex gap-1.5">${u.history.map(pts => `<div class="form-dot dot-${pts}">${pts===10?'W':pts===5?'-':'L'}</div>`).join('')}</div></td>
                    <td class="p-6 text-right font-black text-[#000080] text-xl">${u.total} XP</td></tr>`).join('');
        }
        window.onload = loadLB;
    </script>
</body>
</html>
