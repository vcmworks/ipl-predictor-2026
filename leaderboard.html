<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPL 2026 | Leaderboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #FFD700; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-radius: 1.5rem; }
    </style>
</head>
<body class="min-h-screen">

    <nav>
    <div class="nav-container">
        <h1 style="color: var(--tiranga-navy); font-weight: 900; font-style: italic; font-size: 1.5rem;">IPL 2026</h1>
        <div style="display: flex; gap: 1.5rem; align-items: center;">
            <a href="index.html" style="text-decoration: none; color: #475569; font-weight: 700; font-size: 0.8rem; text-transform: uppercase;">Predict</a>
            <a href="leaderboard.html" style="text-decoration: none; color: var(--tiranga-navy); font-weight: 900; font-size: 0.8rem; text-transform: uppercase;">Leaderboard</a>
        </div>
    </div>
    </nav>

    <main style="max-width: 800px; margin: 0 auto; padding: 2rem 1.5rem;">
        <div style="text-align: center; margin-bottom: 3rem;">
            <h2 style="font-size: 2.5rem; font-weight: 900; color: var(--tiranga-navy); text-transform: uppercase; font-style: italic;">Champions Table</h2>
        </div>

        <div class="glass" style="padding: 1.5rem; box-shadow: 0 10px 30px rgba(0,0,0,0.1);">
            <table class="leaderboard-table">
                <thead>
                    <tr style="text-align: left; color: #64748b; font-size: 0.7rem; text-transform: uppercase; font-weight: 900; letter-spacing: 1px;">
                        <th style="padding: 1rem;">Rank</th>
                        <th style="padding: 1rem;">Player</th>
                        <th style="padding: 1rem; text-align: right;">Points</th>
                    </tr>
                </thead>
                <tbody id="leaderboardBody">
                    </tbody>
            </table>
        </div>
    </main>

    <script>
        const API = "YOUR_DEPLOYED_URL_HERE";

        async function loadLeaderboard() {
            const res = await fetch(`${API}?action=getLeaderboard`);
            const data = await res.json();
            const body = document.getElementById('leaderboardBody');

            body.innerHTML = data.map((user, index) => `
                <tr class="border-b border-black/5 hover:bg-white/50 transition">
                    <td class="p-4 font-black text-[#000080]">#${index + 1}</td>
                    <td class="p-4 font-bold text-slate-800">${user.name}</td>
                    <td class="p-4 font-black text-right text-xl">${user.total}</td>
                </tr>
            `).join('');
        }

        window.onload = loadLeaderboard;
    </script>
</body>
</html>
