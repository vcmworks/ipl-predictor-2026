<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <title>IPL 2026 Prediction Center</title>
</head>
<body class="bg-slate-900 text-white font-sans p-6">
    <nav class="flex justify-between items-center max-w-4xl mx-auto mb-10">
        <h1 class="text-3xl font-black italic text-yellow-400">IPL 2026</h1>
        <div class="space-x-4">
            <a href="leaderboard.html" class="text-sm border border-white/20 px-4 py-2 rounded-lg hover:bg-white/10">Leaderboard</a>
            <span id="userBadge" class="bg-blue-600 px-3 py-1 rounded text-xs font-bold"></span>
        </div>
    </nav>

    <div id="container" class="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-4xl mx-auto">
        <p class="text-center col-span-2 text-gray-500 animate-pulse">Loading matches from Google Sheets...</p>
    </div>

    <script>
        const API = "YOUR_APPS_SCRIPT_URL_HERE";
        let user = localStorage.getItem('ipl_username') || prompt("Enter Username:");
        localStorage.setItem('ipl_username', user);
        document.getElementById('userBadge').innerText = user;

        async function load() {
            const res = await fetch(API);
            const data = await res.json();
            const container = document.getElementById('container');
            container.innerHTML = '';

            data.slice(1).forEach(m => {
                const [id, date, time, home, away, stadium] = m;
                const matchDate = new Date(`${date}T${time}`);
                const isLocked = new Date() > matchDate;

                container.innerHTML += `
                    <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-xl relative overflow-hidden">
                        ${isLocked ? '<div class="absolute inset-0 bg-black/40 flex items-center justify-center z-10 font-bold text-red-400 uppercase tracking-widest">Match Started</div>' : ''}
                        <div class="flex justify-between text-[10px] text-gray-400 mb-4 font-bold">
                            <span>${date}</span>
                            <span>${time} IST</span>
                        </div>
                        <div class="flex items-center justify-between mb-4">
                            <button onclick="vote(${id},'${home}')" class="flex-1 p-3 bg-slate-700 rounded-lg hover:bg-yellow-500 hover:text-black transition font-bold">${home}</button>
                            <span class="mx-4 text-gray-600 font-black">VS</span>
                            <button onclick="vote(${id},'${away}')" class="flex-1 p-3 bg-slate-700 rounded-lg hover:bg-yellow-500 hover:text-black transition font-bold">${away}</button>
                        </div>
                        <p class="text-center text-[10px] text-slate-500 uppercase">${stadium}</p>
                    </div>
                `;
            });
        }

        async function vote(matchId, team) {
            const res = await fetch(API, {
                method: 'POST',
                body: JSON.stringify({ user, matchId, team })
            });
            alert("Prediction Saved for " + team + "!");
        }

        load();
    </script>
</body>
</html>
