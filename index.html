<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPL 2026 | Predictions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #FFD700; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-radius: 1.5rem; border: 1px solid rgba(0,0,0,0.05); }
        .team-btn { 
            flex: 1; padding: 1rem; border-radius: 1rem; font-weight: 900; 
            transition: all 0.2s; border: 2px solid #e2e8f0; background: white; color: #1e293b;
        }
        .team-btn.selected { background: #000080; color: white; border-color: #000080; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(0,0,128,0.2); }
        .nav-link { font-size: 0.75rem; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; color: #1e293b; }
    </style>
</head>
<body class="min-h-screen">

    <nav>
    <div class="nav-container">
        <h1 style="color: var(--tiranga-navy); font-weight: 900; font-style: italic; font-size: 1.5rem;">IPL 2026</h1>
        <div style="display: flex; gap: 1.5rem; align-items: center;">
            <a href="index.html" style="text-decoration: none; color: var(--tiranga-navy); font-weight: 900; font-size: 0.8rem; text-transform: uppercase;">Predict</a>
            <a href="leaderboard.html" style="text-decoration: none; color: #475569; font-weight: 700; font-size: 0.8rem; text-transform: uppercase;">Leaderboard</a>
            <button onclick="logout()" style="color: #ef4444; border: 1px solid #fee2e2; padding: 4px 12px; border-radius: 99px; font-weight: 800; font-size: 0.7rem; cursor: pointer;">LOGOUT</button>
        </div>
    </div>
    </nav>

    <div style="max-width: 1200px; margin: 0 auto; padding: 2rem 1.5rem;">
        <div style="text-align: center; margin-bottom: 3rem;">
            <h2 style="font-size: 2.5rem; font-weight: 900; color: var(--tiranga-navy); text-transform: uppercase; font-style: italic;">Prediction Center</h2>
            <p style="font-weight: 700; color: #1e293b; letter-spacing: 2px;">VOTE FOR YOUR WINNER</p>
        </div>

        <div id="matchGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </div>
    <div id="loginOverlay" class="fixed inset-0 bg-[#000080]/90 z-[999] flex items-center justify-center p-6 backdrop-blur-sm">
        <div class="bg-white p-8 rounded-[2rem] w-full max-w-sm text-center shadow-2xl">
            <h2 class="text-2xl font-black mb-6 italic">PLAYER LOGIN</h2>
            <input type="text" id="loginUser" placeholder="Username" class="w-full bg-slate-100 p-4 rounded-xl mb-3 outline-none">
            <input type="password" id="loginPass" placeholder="Password" class="w-full bg-slate-100 p-4 rounded-xl mb-6 outline-none">
            <button onclick="handleLogin()" id="loginBtn" class="w-full bg-[#FFD700] text-[#000080] p-4 rounded-xl font-black uppercase">Start Predicting</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
