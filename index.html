<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPL 2026 | Prediction Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen">
    <div id="loginOverlay" class="fixed inset-0 bg-blue-900/60 z-[999] flex items-center justify-center p-6 backdrop-blur-md">
        <div class="bg-white p-8 rounded-[2rem] w-full max-w-sm text-center shadow-2xl">
            <img src="https://upload.wikimedia.org/wikipedia/en/thumb/8/84/Indian_Premier_League_Official_Logo.svg/1200px-Indian_Premier_League_Official_Logo.svg.png" class="h-16 mx-auto mb-8" alt="IPL">
            <input type="text" id="loginUser" placeholder="Username" class="w-full bg-slate-100 p-4 rounded-2xl mb-4 outline-none focus:ring-2 ring-[#FF9933]">
            <input type="password" id="loginPass" placeholder="Password" class="w-full bg-slate-100 p-4 rounded-2xl mb-6 outline-none focus:ring-2 ring-[#FF9933]">
            <button onclick="handleLogin()" id="loginBtn" class="w-full bg-[#000080] text-white p-4 rounded-2xl font-black uppercase tracking-widest hover:bg-blue-800 transition shadow-lg">Login to Predict</button>
            <p id="loginError" class="text-red-500 text-xs mt-4 hidden font-bold">Invalid username or password</p>
        </div>
    </div>

    <nav class="bg-white/80 backdrop-blur-md shadow-sm sticky top-0 z-50 border-b border-slate-200">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-2"><img src="https://upload.wikimedia.org/wikipedia/en/thumb/8/84/Indian_Premier_League_Official_Logo.svg/1200px-Indian_Premier_League_Official_Logo.svg.png" class="h-8"><h1 class="text-2xl font-black text-[#000080] italic">2026</h1></div>
            <div class="flex gap-4 items-center">
                <a href="leaderboard.html" class="text-xs font-black text-slate-500 hover:text-[#FF9933] uppercase">Leaderboard</a>
                <button onclick="logout()" class="bg-red-50 text-red-600 px-4 py-1.5 rounded-full text-[10px] font-black uppercase">Logout</button>
            </div>
        </div>
    </nav>

    <div class="relative h-64 md:h-80 flex items-center justify-center overflow-hidden">
        <img src="https://images.unsplash.com/photo-1540747913346-19e32dc3e97e?auto=format&fit=crop&w=1000&q=60" class="absolute inset-0 w-full h-full object-cover" alt="Stadium">
        <div class="absolute inset-0 bg-gradient-to-b from-[#000080]/80 to-transparent"></div>
        <div class="relative text-center px-6">
            <h2 class="text-4xl md:text-6xl font-black text-white italic mb-2">PREDICTION CENTER</h2>
            <p class="text-white/90 font-bold mt-4 text-xs uppercase tracking-widest">Next 7 Matches Available</p>
        </div>
    </div>

    <main class="max-w-6xl mx-auto p-6 -mt-12 relative z-10">
        <div id="matchGrid"></div>
    </main>
    <script src="script.js"></script>
</body>
</html>
